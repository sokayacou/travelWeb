<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Travel Website</title>
        <style>
            html,body{
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
            }

            #contact{
                background-color: rgb(4, 4, 150);
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                height: 5em;
            }
            .profile_name{
                display: flex;
                flex-flow: row nowrap;
                align-items: center;
                margin: 1cm -1cm 1cm 0;
                font-size: 25px;
                font-weight: bolder;
                font-style: italic;
                width: 50%;
            }
            .topmenu{
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-items: center;
                padding: 1em;
                text-align: justify;
                text-decoration: none;
                width: 50%;
                gap: 30px;
            }
            .topmenu a {
                color: white;
                text-decoration: none;
                margin: 10px;
            }

            a:hover{
                font-weight:bold ;
                text-decoration: underline;
            }
            .social_medias{
                padding-top: 12%;
                display: flex;
                flex-flow: column nowrap;
                gap: 10px;
            }
            .contact_bg{
                display: flex;
                flex-direction: column;
                background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),url('./images/Monument_des_martyrs1.jpg');
                background-position: center;
                background-size: cover;
                background-attachment: fixed;
                background-repeat: no-repeat;
                min-height: 100vh;
            }
            .contactus{
                display: flex;
                flex-flow: row-reverse nowrap;
                justify-content: left;
                align-items: start;
                gap: 30px;
                color: white;
            }
            .contactus img{
                width: 25px;
                padding: 10px 20px 10px 20px;
            }
            .contacts{
                display: flex;
                flex-flow: row nowrap;
                justify-content: space-between;
                align-items: center;
                gap: 18em;
                margin-top: 8%;

            }
            #contact_us{
                display: flex;
                flex-flow: column nowrap;
                justify-content: start;
                background-image: inherit;
                width: 15cm;
                margin-left: 80px;
            }
            input,textarea {
                background: inherit;
                border: 0.2px solid rgba(255, 255, 255, 0.336);
                padding: 15px 0 15px 15px;
                font-size: 15px;
                border-radius: 5px;
            }
            button{
                color: white;
                background-color: rgb(3, 44, 3);
                padding: 15px 0 15px 15px;
                border: 0.2px solid rgb(3, 44, 3);;
                border-radius: 5px;
            }
            h1{
                font-family: 'Times New Roman', Times, serif;
                font-size: 40px;
            }
        </style>
    </head>
    <body>
        <nav>
            <div id="contact">
                <div class="profile_name">
                    <img src="./images/icon.png" width="80px">TravelBloom
                </div>
                <div class="topmenu">
                    <a href="./travel_recommendation.html">Home</a>
                    <a href="./aboutus.html">About Us</a>
                    <a href="#contact">Contact Us</a>
                </div>
            </div>
        </nav>
        <div class="contact_bg">
            <div class="contactus">
                <div class="contacts">
                    <h1>CONTACT US</h1>
                    <form action="#" id="contact_us">
                        <label for="name">Name</label><br>
                        <input type="text" id="name" name="name" placeholder="Enter your name"><br>
                        <label for="email">Email</label><br>
                        <input type="email" id="email" name="email" placeholder="Enter your email"><br>
                        <label for="message">Message</label><br>
                        <textarea name="message" id="message" placeholder="Enter your message" rows="5" ></textarea><br>
                        <button type="submit" id="formBtn">Submit</button>
                    </form>
                </div>
                <div class="social_medias">
                    <a href="http://www.x.com" target="_blank">
                        <img src="images/logo-twitter-blanc-png.png">
                    </a>
                    <a href="http://www.facebook.com" target="_blank">
                        <img src="images/icon_facebook.png" style="width: 15px;">
                    </a>
                    <a href="http://www.intagram.com" target="_blank">
                        <img src="./images/icon_intagram.png">
                    </a>
                    <a href="http://www.youtube.com" target="_blank">
                        <img src="./images/logo-youtube-blanc-png.png">
                    </a>
                </div>  
            </div>
            
        </div>
    </body>
</html>
