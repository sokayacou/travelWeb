<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Travel Website</title>
        <style>
            html,body{
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
            }

            #home{
                background-color: rgb(4, 4, 150);
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                height: 5em;
            }
            .profile_name{
                display: flex;
                flex-flow: row nowrap;
                align-items: center;
                margin: 1cm -1cm 1cm 0;
                font-size: 25px;
                font-weight: bolder;
                font-style: italic;
                width: 50%;
            }
            .topmenu{
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-items: center;
                padding: 1em;
                text-align: justify;
                text-decoration: none;
                width: 50%;
                gap: 30px;
            }
            .topmenu a {
                color: white;
                text-decoration: none;
                margin: 10px;
            }

            a:hover{
                font-weight:bold ;
                text-decoration: underline;
            }

            #searchForm{
                width:auto;
                margin-right: 10px;
                border-radius: 20px;
                background-color: white;
                flex: 1 1 auto;
                display: flex;
                flex-flow: row nowrap;
                align-items: stretch;
                gap: 5px;
                padding: 5px ;
                height: 1cm;
            
            }

            button{
                padding: 10px 20px 10px 20px;
                background-color: green;
                color: white;
                font-family: Arial, Helvetica, sans-serif;
                border: 1px solid green;
                border-radius: 15px;
                font-size: 15px;
                cursor: pointer;
            }
            input{
                width: 3in;
                border: 1px solid white;
                border-radius: 10px;
                font-size: 1em;
                text-align: left;
                background-image: url('./images/search-icon.png');
                background-position: calc(100% - 10px) center;
                background-repeat: no-repeat;
                background-size: 20px;
                
            }
            .home_background{
                background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),url('./images/Monument_des_martyrs1.jpg');
                background-position: center;
                background-size: cover;
                background-attachment: fixed;
                background-repeat: no-repeat;
                min-height: 100vh;
            }
            .home_page{
                
                display: flex;
                flex-flow: row nowrap;
                justify-content: left;
                align-items: center;
                gap: 30px;
            }
            .home_page img{
                width: 35px;
                padding: 10px;
            }
            .social_medias{
                margin-top: 12%;
                display: flex;
                flex-flow: column nowrap;
                gap: 20px;
            }
            .home_text{
                margin-top: 12%;
                width: 15cm;
                color: aliceblue;
                font-size: large;
                margin-left: 90px;
            }
            .result{
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 20px;
                grid-auto-flow: row;
                padding: 10px;
            }
            .item img{
                display: block;
                margin-top: 0;
                margin-bottom: 0;
            }
            .item h2, .item p {
                margin: 0;
                padding:0 10px 0 10px;

            }
            .container_result  {
                background: inherit;
            }
            .container_result h1 {
                color:orangered;
            }
        </style>
    </head>
    <body>
        <nav>
            <div id="home">
                <div class="profile_name">
                    <img src="./images/icon.png" width="80px">TravelBloom 
                </div>
                <div class="topmenu">
                    <a href="#home">Home</a>
                    <a href="./aboutus.html">About Us</a>
                    <a href="./contacts.html">Contact Us</a>
                </div>
                <form id="searchForm">
                    <input type="search" id="search" name="search" placeholder="Enter a destination or Keyword">
                    <button type="button" style="width: max-content;" id="searchBtn">Search</button>
                    <button type="button" id="resetBtn">Clear</button>
                </form>
            </div>
        </nav>
        <div class="home_background" id="home_bg">
            <div class="home_page" id="home_page">
                <div class="social_medias">
                    <a href="http://www.x.com" target="_blank">
                        <img src="images/logo-twitter-blanc-png.png">
                    </a>
                    <a href="http://www.facebook.com" target="_blank">
                        <img src="images/icon_facebook.png" style="width: 15px;">
                    </a>
                    <a href="http://www.intagram.com" target="_blank">
                        <img src="./images/icon_intagram.png">
                    </a>
                    <a href="http://www.youtube.com" target="_blank">
                        <img src="./images/logo-youtube-blanc-png.png">
                    </a>
                </div>  
                <div class="home_text" id="home_2">
                    <h1>DISCOVER DREAM DESTINATION</h1>
                    <P>
                        Search and explore the different places you dream of visiting. 
                        This site allows you to travel to the countries you desire. 
                        You will love what you see on this site.
                    </P>
                    <button id="btn">Book New</button>
                </div>
                
            </div>
            
        </div>
        <script src="./travel_recommendation.js"></script>
    </body>
</html>
